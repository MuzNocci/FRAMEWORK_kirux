<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.AppName}} | {{.Code}}</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--go-blue:#00ACD7;--go-blue-light:#5DC9E2;--go-blue-dark:#00758D;--bg:#0D1117;--surface:#161B22;--border:#1E2A38;--text:#E6EDF3;--muted:#8B949E}html,body{height:100%}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:auto}header{border-bottom:1px solid var(--border);padding:.9rem 2.5rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0}.logo-img{height:24px;width:auto;display:block}header .version{margin-left:auto;font-size:.7rem;color:var(--muted);background:var(--border);padding:.2rem .55rem;border-radius:999px}main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;text-align:center;gap:1.1rem}.code{font-size:clamp(5.5rem,18vw,9rem);font-weight:800;line-height:1;letter-spacing:-.05em;color:#2D3748}h1{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:700;letter-spacing:-.02em;color:var(--text)}.message{font-size:clamp(.82rem,1.4vw,.95rem);color:var(--muted);max-width:400px;line-height:1.65;margin-top:.1rem}.actions{display:flex;gap:.75rem;margin-top:.75rem;flex-wrap:wrap;justify-content:center}.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1.1rem;border-radius:8px;font-size:.82rem;text-decoration:none;transition:border-color .2s,color .2s,background .2s}.btn-back{background:var(--surface);border:1px solid var(--border);color:var(--muted)}.btn-back:hover{border-color:var(--go-blue-dark);color:var(--text)}.btn-home{background:transparent;border:1px solid transparent;color:var(--muted)}.btn-home:hover{color:var(--go-blue-light)}footer{border-top:1px solid var(--border);padding:.75rem 2rem;text-align:center;font-size:.82rem;color:var(--muted);flex-shrink:0}footer a{color:var(--go-blue);text-decoration:none}footer a:hover{text-decoration:underline}@media(max-width:640px){main{padding:2rem 1.25rem;gap:1rem}footer{font-size:.9rem;padding:1.25rem 2rem}}@media(max-width:380px){.actions{flex-direction:column;align-items:center}}</style>
</head>
<body>
<header>
  <img src="/kyrux/statics/kyrux_wt.png" class="logo-img" alt="Kyrux">
  <span class="version">v{{.Version}}</span>
</header>
<main>
  <div class="code">{{.Code}}</div>
  <h1>{{.Title}}</h1>
  <p class="message">{{.Message}}</p>
  <div class="actions">
    <a href="javascript:history.back()" class="btn btn-back">&#8592; Voltar</a>
    <a href="/" class="btn btn-home">&#8962; Início</a>
  </div>
</main>
<footer>
  Kyrux Framework &mdash; construído com <a href="https://go.dev" target="_blank">Go</a>
  &nbsp;&middot;&nbsp;
  <a href="https://www.kyrux.com.br/docs/" target="_blank">Documentação</a>
  &nbsp;&middot;&nbsp;
  desenvolvido por <a href="https://www.nocciolli.com.br" target="_blank">M&uuml;ller Nocciolli</a>
</footer>
</body>
</html>
